<svg width="420" height="20" viewBox="0 0 420 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="electric" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ADEF">
        <animate attributeName="stop-color" values="#00ADEF; #4BE1FF; #00ADEF;" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0077B6">
        <animate attributeName="stop-color" values="#0077B6; #00ADEF; #0077B6;" dur="2s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Linha de energia -->
  <rect x="0" y="8" width="420" height="4" rx="2" fill="url(#electric)" filter="url(#glow)">
    <animate attributeName="width" values="420; 390; 420" dur="1.6s" repeatCount="indefinite" />
    <animate attributeName="x" values="0; 15; 0" dur="1.6s" repeatCount="indefinite" />
  </rect>
</svg>
