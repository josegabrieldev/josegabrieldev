name: Gerar Cobrinha (Snake)

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar a Cobrinha Blue Steel
        uses: Platane/snk@v2.1.0
        with:
          github_user_name: josegabrieldev

          # Tema 100% personalizado DevSnake Blue Steel
          theme: |
            {
              "background": "#0F1724",
              "snake": "#00ADEF",

              "color_empty": "#1A2435",
              "color_level_0": "#1A2435",

              "color_level_1": "#23324A",
              "color_level_2": "#2D3B55",
              "color_level_3": "#3A4A6A",
              "color_level_4": "#00ADEF"
            }

          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg

      - name: Publicar na branch saida
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: saida
          folder: dist
          clean: true
