name: Gerar Cobrinha (Snake)

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar a cobrinha
        uses: Platane/snk@v3
        with:
          github_user_name: josegabrieldev

          snake_color: "#00ADEF"            # Azul Tecnológico (cor da cobrinha)
          background_color: "#0F1724"       # Fundo Blue Steel
          grid_color_dark: "#1A2435"        # Quadrados escuros
          grid_color_light: "#23324A"       # Quadrados claros

          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg

      - name: Publicar na branch saida
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: saida
          folder: dist
          clean: true
