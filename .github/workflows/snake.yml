name: Gerar Cobrinha (Snake)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar a cobrinha
        uses: Platane/snk@v3
        with:
          github_user_name: josegabrieldev
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg

      - name: Publicar na branch Saída
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: Saída
          folder: dist
          clean: true
